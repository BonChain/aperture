name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PINNED_MOVE_SHA: a0ec1e08996074b11ade2a1ede035cf5a108d291

jobs:
  # 1. Move format gate (separate from prettier — `sui move build` does not
  #    catch unformatted Move, so CI must run prettier-move explicitly).
  format-move:
    name: Move format (prettier-plugin-move)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install prettier-plugin-move
        run: npm install -g prettier @mysten/prettier-plugin-move
      - name: Check Move format
        run: prettier-move -c 'move/sources/**/*.move' 'move/tests/**/*.move'

  # 2. Move build + test (requires sui CLI).
  move-build-test:
    name: Move build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install sui CLI (pinned to devnet channel — matches move/Move.toml [environments] devnet = 4fe43958)
        run: |
          curl -L -o /tmp/sui.tar.gz https://github.com/MystenLabs/sui/releases/download/devnet-v1.73.0/sui-devnet-v1.73.0-ubuntu-x86_64.tar.gz
          tar -xzf /tmp/sui.tar.gz -C /tmp
          sudo mv /tmp/sui /usr/local/bin/sui
          sui --version
      - name: Verify pin
        run: pnpm verify:pin
      - name: Build Move
        run: pnpm build:move
      - name: Test Move
        run: pnpm test:move

  # 3. TS build (wasm + core/crypto + sdk + spike).
  ts-build:
    name: TS build (wasm + core + sdk + spike)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - name: Install Rust + wasm target + wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack
      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile
      - name: Build wasm
        run: pnpm build:wasm
      - name: Build core crypto (TS strict)
        run: pnpm build:crypto

  # 4. TS test (Vitest across core, spike, sdk).
  ts-test:
    name: TS test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - run: pnpm install --frozen-lockfile
      - name: Run all tests (core + spike + sdk — Move handled by separate job)
        run: |
          pnpm --filter @aperture/core test
          pnpm --filter @aperture/spike test
          pnpm --filter @aperture/sdk test:adapter-version

  # 5. Pin / version-skew assert (submodule HEAD == Move.toml rev == .npmrc).
  pin-assert:
    name: Pin version-skew assert
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - run: pnpm install --frozen-lockfile
      - name: Verify pin across all 3 tracked locations
        run: pnpm verify:pin
